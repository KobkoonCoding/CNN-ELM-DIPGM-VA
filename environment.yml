# Conda environment for the DIPGM-VA chest X-ray classification pipeline.
# Usage:
#   conda env create -f environment.yml
#   conda activate dipgm-va
name: dipgm-va
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.12
  - pip>=24
  - numpy>=1.26
  - pandas>=2.2
  - scipy>=1.13
  - scikit-learn>=1.5
  - matplotlib>=3.9
  - seaborn>=0.13
  - pillow>=10.3
  - tqdm>=4.66
  - jupyter>=1.1
  - ipywidgets>=8.1
  # PyTorch (GPU). For CPU-only, replace the next three lines with: pytorch cpuonly
  - pytorch>=2.4
  - torchvision>=0.19
  - pytorch-cuda=12.1
  - pip:
      - timm>=1.0.11
      - opencv-python-headless>=4.10
      - kagglehub>=0.3
